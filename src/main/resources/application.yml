server:
  port: 8080

spring:
  application:
    name: syswatch

  datasource:
    url: jdbc:mysql://localhost:3308/syswatch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

logging:
  level:
    root: INFO

syswatch:
  ssh:
    host: localhost
    port: 22
    username: root
    password: prom123

  prometheus:
    rule-dir: /root/docker-services/prometheus/rules/

prometheus:
  reload-url: http://localhost:9099/-/reload

alert:
  feishu:
    webhook: https://open.feishu.cn/open-apis/bot/v2/hook/3cc88e9e-410e-4b50-a9f1-6d9240f99f5d

# Alertmanager配置
alertmanager:
  # Alertmanager API地址
  url: http://localhost:9094
  # API版本路径
  api-path: /api/v2
  # 连接超时（毫秒）
  connect-timeout: 5000
  # 读取超时（毫秒）
  read-timeout: 10000