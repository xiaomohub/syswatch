server:
  port: 8080

spring:
  application:
    name: syswatch

  config:
    import: optional:nacos:syswatch.yaml

  cloud:
    nacos:
      server-addr: localhost:8849
      config:
        file-extension: yaml
        import-check:
          enabled: false

  sql:
    init:
      mode: never

syswatch:
  ssh:
    host: localhost   # WSL IP
    port: 22
    username: root
    password: prom123

  prometheus:
    rule-dir: /root/docker-services/prometheus/rules/


alert:
  feishu:
    webhook: https://open.feishu.cn/open-apis/bot/v2/hook/3cc88e9e-410e-4b50-a9f1-6d9240f99f5d

